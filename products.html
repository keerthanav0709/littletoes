<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LITTLETOES</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: url('webimg1.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    header {
      background-color: #cbfffff5;
      padding: 20px;
      text-align: center;
      color: #333;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    .product-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 300px;
      margin: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .product-details {
      padding: 15px;
      text-align: center;
    }
    .product-details h2 {
      font-size: 1.5rem;
      color: #444;
      margin: 0 0 10px;
    }
    .product-details p {
      font-size: 1rem;
      color: #666;
      margin: 0 0 10px;
    }
    .product-details .price {
      font-size: 1.2rem;
      color: #000;
      font-weight: bold;
    }
    .product-details button {
      background: #ff6666;
      color: #fff;
      border: none;
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      text-decoration: none;
    }
    .product-details button:hover {
      background: #ff3333;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 10px 0;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>LITTLETOES</h1>
    <p>Your one-stop shop for baby essentials and toys!</p>
  </header>

  <section class="product-section">
    <!-- Product 1 -->
    <div class="product-card">
      <img src="https://images.meesho.com/images/products/248659767/uwkde_512.webp" alt="Soft Toy">
      <div class="product-details">
        <h2>Toys</h2>
        <p>A cuddly companion for your little one.</p>
        <a href="products1.html">
          <button>Buy Now</button>
        </a>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1604467794349-0b74285de7e7?fm=jpg&q=60&w=3000&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmFieSUyMGNsb3RoaW5nfGVufDB8fDB8fHww" alt="Baby Clothes">
      <div class="product-details">
        <h2>Baby Clothes</h2>
        <p>Comfortable and stylish for your baby.</p>
        <a href="products2.html">
          <button>Buy Now</button>
        </a>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
      <img src="https://freshbeautyfix.com/wp-content/uploads/2018/09/freshbeautyfix-baby-skincare-essentials-flatlay.jpg?w=620" alt="Baby Products">
      <div class="product-details">
        <h2>Baby Products</h2>
        <p>Comfort, Care, and Joy for Your Little Ones!</p>
        <a href="products3.html">
          <button>Buy Now</button>
        </a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2024 Baby Care E-Commerce. All Rights Reserved.</p>
  </footer>
</body>
</html>
