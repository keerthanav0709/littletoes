<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storytelling</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url('webimg1.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
    }
    .header {
      background-color: rgba(250, 69, 220, 0.733);
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .search-bar {
      margin: 20px;
      text-align: center;
    }
    .search-bar input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
    }
    .stories-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }
    .story-card {
      background-color: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin: 10px;
      width: 300px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .story-card:hover {
      transform: scale(1.05);
    }
    .story-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .action-buttons {
      margin-top: 10px;
    }
    .action-buttons a {
      display: inline-block;
      background-color: rgba(250, 69, 220, 0.733);
      border: none;
      border-radius: 5px;
      padding: 10px 15px;
      text-decoration: none;
      color: white;
      font-size: 16px;
    }
    .action-buttons a:hover {
      background-color: rgba(200, 50, 180, 0.8);
    }
  </style>
</head>
<body>
  <div class="header">Storytelling</div>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search stories...">
  </div>

  <!-- Stories Container -->
  <div class="stories-container">
    <!-- The Lion and the Mouse -->
    <div class="story-card">
      <img src="lionandm.jpg" alt="The Lion and the Mouse">
      <h2>The Lion and the Mouse</h2>
      <div class="action-buttons">
        <a href="lion-mouse.html">Read Story</a>
      </div>
    </div>

    <!-- The Tortoise and the Hare -->
    <div class="story-card">
      <img src="hare.jpg" alt="The Tortoise and the Hare">
      <h2>The Tortoise and the Hare</h2>
      <div class="action-buttons">
        <a href="tortoise-hare.html">Read Story</a>
      </div>
    </div>

    <!-- Goldilocks and the Three Bears -->
    <div class="story-card">
      <img src="gold.jpg" alt="Goldilocks and the Three Bears">
      <h2>Goldilocks and the Three Bears</h2>
      <div class="action-buttons">
        <a href="goldilocks.html">Read Story</a>
      </div>
    </div>

    <!-- The Ugly Duckling -->
    <div class="story-card">
      <img src="duck.jpg" alt="The Ugly Duckling">
      <h2>The Ugly Duckling</h2>
      <div class="action-buttons">
        <a href="ugly-duckling.html">Read Story</a>
      </div>
    </div>

    <!-- Cinderella -->
    <div class="story-card">
      <img src="cinderella.jpg" alt="Cinderella">
      <h2>Cinderella</h2>
      <div class="action-buttons">
        <a href="cinderella.html">Read Story</a>
      </div>
    </div>
  </div>

  <script>
    // Search functionality
    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", (e) => {
      const filter = e.target.value.toLowerCase();
      const cards = document.querySelectorAll(".story-card");

      cards.forEach((card) => {
        const title = card.querySelector("h2").textContent.toLowerCase();
        if (title.includes(filter)) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }
      });
    });
  </script>
</body>
</html>
